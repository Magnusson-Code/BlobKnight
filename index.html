function updateBoss() {
  const b = gs.boss;
  if (!b) return;
  b.ft++;
  if (b.flashT > 0) b.flashT--;
  b.bob = Math.sin(b.ft * 0.04) * 3;

  // ── Entrén: glider in från höger ──────────────────────────────────────────
  if (b.entering) {
    b.x -= b.enterSpeed;
    if (b.x <= b.targetX) {
      b.x = b.targetX;
      b.entering = false;
      snd.bossRoar();          // ryt när bossen är i position
    }
    return;                    // ingen attack/kollision under entrén
  }

  // Dying animation
  if (b.dying) {
    b.deathT++;
    if (b.deathT % 10 === 0 && b.deathT < 80) {
      spawnParticles(
        b.x - 40 + Math.random()*80,
        b.y - 30 - Math.random()*60,
        Math.random() < 0.5 ? '#ffaa44' : '#ff5522', 14);
    }
    if (b.deathT >= 100) {
      // Boss fully gone — clean up
      gs.boss = null;
      gs.bossDefeated = true;
      gs.bossVictoryT = 0;
      // Clear all minions/projectiles
      gs.enemies = gs.enemies.filter(e => e.type !== 'mini-snail');
      gs.slimeWaves  = [];
      gs.shockwaves  = [];
      gs.energyBeams = [];
      gs.venomPools  = [];
    }
    return;
  }

  // Attack FSM — dispatch per boss-typ
  if (b.type === 'scorpion') updateScorpionFSM(b);
  else                       updateSnailFSM(b);

  // Player ↔ boss body collision
  // Snigeln har en hög upprest kropp (60 px tall hitbox), men skorpionen är
  // låg och bred — så där matchar vi hitboxen till själva slammets höjd så
  // kroppen inte "osynligt" sträcker sig upp i hopphöjd och dubbel-skadar.
  if (!blob.invincible) {
    const hb = bossHitbox(b);
    const bodyTop = b.type === 'scorpion' ? b.y - 24 : b.y - 60;
    if (rectsOverlap(blob.x - 22, blob.y - 28 + blob.bobOff, 44, 52,
                     hb.x, bodyTop, hb.w, b.y - bodyTop)) {
      blobHurt();
    }
  }
}

// ── Snigel-FSM (oförändrad logik) ──────────────────────────────────────────
function updateSnailFSM(b) {
  if (b.attackState === 'idle') {
    b.attackTimer--;
    if (b.attackTimer <= 0) {
      b.attackState  = 'windup';
      b.attackStateT = 0;
      b.attackType   = Math.random() < 0.5 ? 'mini' : 'wave';
    }
  } else if (b.attackState === 'windup') {
    b.attackStateT++;
    if (b.attackStateT >= 36) {
      if (b.attackType === 'mini') {
        b.miniCount    = 1 + Math.floor(Math.random() * 3);
        b.miniSpawned  = 0;
        b.attackState  = 'fire';
        b.attackStateT = 0;
      } else {
        spawnSlimeWave();
        b.attackState  = 'recover';
        b.attackStateT = 0;
      }
    }
  } else if (b.attackState === 'fire') {
    b.attackStateT++;
    const interval = 22;
    if (b.miniSpawned < b.miniCount &&
        b.attackStateT >= b.miniSpawned * interval) {
      spawnMiniSnail();
      b.miniSpawned++;
    }
    if (b.miniSpawned >= b.miniCount &&
        b.attackStateT >= (b.miniCount - 1) * interval + 18) {
      b.attackState  = 'recover';
      b.attackStateT = 0;
    }
  } else if (b.attackState === 'recover') {
    b.attackStateT++;
    if (b.attackStateT >= 24) {
      b.attackState = 'idle';
      b.attackTimer = b.attackCD;
    }
  }
}

// ── Skorpion-FSM ──────────────────────────────────────────────────────────
// 40% Gaddslag (must JUMP), 30% Pincersvep (must NOT jump), 30% Giftspott (must JUMP)
function updateScorpionFSM(b) {
  if (b.attackState === 'idle') {
    b.pose = 'idle';
    b.attackTimer--;
    if (b.attackTimer <= 0) {
      b.attackState  = 'windup';
      b.attackStateT = 0;
      const r = Math.random();
      b.attackType = r < 0.40 ? 'tail' : r < 0.70 ? 'pincer' : 'venom';
    }
  } else if (b.attackState === 'windup') {
    b.attackStateT++;
    // Pose under windup
    if (b.attackType === 'tail')        b.pose = 'rear';
    else if (b.attackType === 'pincer') b.pose = 'tail-up';   // svansen reser sig högt → stinger laddar
    else                                b.pose = 'rear';

    const windupDur = b.attackType === 'pincer' ? 38 : 28;
    if (b.attackStateT >= windupDur) {
      if (b.attackType === 'tail') {
        // Tail-attack startar nu dash-forward-sekvensen
        b.dashStartX  = b.x;
        b.dashTargetX = b.x - 460;   // ~mot blob (rusar 460 px vänster)
        b.attackState  = 'tail-dash-fwd';
        b.attackStateT = 0;
        b.pose = 'tail-up';
      } else if (b.attackType === 'pincer') {
        b.pose = 'tail-up';           // svansen kvarsteår uppe medan stingern skjuter
        spawnPincerBeam();
        b.attackState  = 'fire';
        b.attackStateT = 0;
      } else {
        b.pose = 'rear';
        spawnVenomArc();
        b.attackState  = 'fire';
        b.attackStateT = 0;
      }
    }
  } else if (b.attackState === 'tail-dash-fwd') {
    // Rusar åt vänster mot spelaren — något långsammare för bättre läsbarhet
    b.attackStateT++;
    const dashDur = 32;
    const u = Math.min(1, b.attackStateT / dashDur);
    const eased = u * u;                              // ease-in: accelererande dash
    b.x = b.dashStartX + (b.dashTargetX - b.dashStartX) * eased;
    b.pose = 'tail-up';
    if (b.attackStateT >= dashDur) {
      b.x = b.dashTargetX;
      // Slå ner svansen vid landningspunkten
      spawnTailImpact(b.x - 50, 310);
      b.attackState  = 'tail-slam';
      b.attackStateT = 0;
    }
  } else if (b.attackState === 'tail-slam') {
    // Svansen slår NER mot marken framför kroppen
    b.attackStateT++;
    b.pose = 'tail-slam';
    if (b.attackStateT >= 16) {
      b.attackState  = 'tail-dash-back';
      b.attackStateT = 0;
    }
  } else if (b.attackState === 'tail-dash-back') {
    // Backar långsammare tillbaka till sitt utgångsläge
    b.attackStateT++;
    const dashDur = 38;
    const u = Math.min(1, b.attackStateT / dashDur);
    const eased = 1 - (1 - u) * (1 - u);              // ease-out: bromsar in
    b.x = b.dashTargetX + (b.dashStartX - b.dashTargetX) * eased;
    b.pose = 'rear';
    if (b.attackStateT >= dashDur) {
      b.x = b.dashStartX;
      b.attackState  = 'recover';
      b.attackStateT = 0;
      b.pose = 'idle';
    }
  } else if (b.attackState === 'fire') {
    b.attackStateT++;
    // Pincer-attacken: håll svansen uppe under hela fire-fönstret medan strålen är aktiv
    if (b.attackType === 'pincer') b.pose = 'tail-up';
    // Kort fire-fönster där posen håller efteranimationen (pincer/venom)
    if (b.attackStateT >= 14) {
      b.attackState  = 'recover';
      b.attackStateT = 0;
      b.pose = 'idle';
    }
  } else if (b.attackState === 'recover') {
    b.attackStateT++;
    b.pose = 'idle';
    if (b.attackStateT >= 22) {
      b.attackState = 'idle';
      b.attackTimer = b.attackCD;
    }
  }
}

// ── Skorpion-projektil-updates ────────────────────────────────────────────
function updateShockwaves() {
  for (let i = gs.shockwaves.length - 1; i >= 0; i--) {
    const s = gs.shockwaves[i];
    s.x -= s.speed;
    s.ft++;
    // Damage-zonen är aktiv inom dmgLife (om satt), annars hela tiden
    const dmgActive = s.dmgLife === undefined || s.ft <= s.dmgLife;
    if (dmgActive && !blob.invincible) {
      const sx = s.x - s.w/2;
      if (rectsOverlap(blob.x-22, blob.y-28+blob.bobOff, 44, 52,
                       sx, s.y - s.h, s.w, s.h)) {
        blobHurt();
      }
    }
    // Ta bort när livslängd nådd eller off-screen
    const expired = (s.life !== undefined && s.ft >= s.life) || s.x < -80;
    if (expired) gs.shockwaves.splice(i, 1);
  }
}

function updateEnergyBeams() {
  for (let i = gs.energyBeams.length - 1; i >= 0; i--) {
    const e = gs.energyBeams[i];
    e.ft++;
    // Beam är aktiv hela `life`-perioden, fyller hela skärmens vänster→höger sträcka
    if (e.ft < e.life && !blob.invincible) {
      const beamX = e.xLeft;
      const beamW = e.xRight - e.xLeft;
      if (rectsOverlap(blob.x-22, blob.y-28+blob.bobOff, 44, 52,
                       beamX, e.y - e.h/2, beamW, e.h)) {
        blobHurt();
      }
    }
    if (e.ft >= e.life + 14) gs.energyBeams.splice(i, 1);
  }
}

function updateVenomPools() {
  for (let i = gs.venomPools.length - 1; i >= 0; i--) {
    const v = gs.venomPools[i];
    if (v.state === 'arc') {
      v.t++;
      const u = v.t / v.arcDur;       // 0..1
      if (u >= 1) {
        v.state = 'pool';
        v.t = 0;
        // Impact-partiklar
        for (let k = 0; k < 12; k++) {
          spawnParticles(v.ex, v.ey - 6, k%2 ? '#66ee44' : '#22aa22', 1);
        }
      }
    } else {
      // 'pool' state
      v.poolLife++;
      // Växer först, sen rör sig vänster
      if (v.poolLife < 14) {
        v.poolW = Math.min(v.poolMaxW, v.poolW + 4.5);
      } else {
        v.poolX -= v.poolSpeed;
        // Pölens kant sakta krymper när den glider iväg
        if (v.poolLife > 80) v.poolW = Math.max(0, v.poolW - 1.2);
      }
      // Kollision under pool-fasen – matchar visuella höjden (~6 px) så man
      // inte träffar "ovanför" pölen när man landar efter ett hopp.
      if (!blob.invincible && v.poolW > 6) {
        const px2 = v.poolX - v.poolW/2;
        if (rectsOverlap(blob.x-22, blob.y-28+blob.bobOff, 44, 52,
                         px2, v.poolY - 6, v.poolW, 6)) {
          blobHurt();
        }
      }
      if (v.poolX < -40 || v.poolW <= 0) gs.venomPools.splice(i, 1);
    }
  }
}

function updateSlimeWaves() {
  for (let i = gs.slimeWaves.length - 1; i >= 0; i--) {
    const s = gs.slimeWaves[i];
    s.x -= s.speed;
    s.ft++;
    // Player collision (only if the player isn't high enough off the ground)
    if (!blob.invincible) {
      const sx = s.x - s.w / 2;
      if (rectsOverlap(blob.x - 22, blob.y - 28 + blob.bobOff, 44, 52,
                       sx, s.y - s.h, s.w, s.h)) {
        blobHurt();
      }
    }
    if (s.x < -120) gs.slimeWaves.splice(i, 1);
  }
}

// ── BOSS DRAWING ────────────────────────────────────────────────────────────
function drawSnailBoss(b) {
  const P = 6;
  const flash = b.flashT > 0 && Math.floor(b.flashT / 2) % 2 === 0;
  const cy = b.y + Math.round(b.bob);
  // Slight forward lean during windup so the player can read the tell
  const leanX = b.attackState === 'windup'
    ? Math.round(-Math.sin(b.attackStateT / 36 * Math.PI) * 8)
    : 0;
  const cx = b.x + leanX;
  const ox = Math.round(cx / P), oy = Math.round(cy / P);

  const C = flash ? {
    body:'#ffffff', bodyD:'#dddddd', foot:'#cccccc',
    shell:'#ffffff', shellD:'#dddddd', shellHL:'#ffffff',
    head:'#ffffff', headHL:'#ffffff', eye:'#ffffff',
    stalk:'#ffffff', mouth:'#cccccc',
  } : {
    body:'#88aa44', bodyD:'#556633', foot:'#445522',
    shell:'#cc9944', shellD:'#7a4a11', shellHL:'#ffe08a',
    head:'#88aa44', headHL:'#aabb66', eye:'#ff2233',
    stalk:'#778833', mouth:'#334422',
  };

  const r = (y, x0, x1, col) => { ctx.fillStyle = col; ctx.fillRect(x0*P, y*P, (x1-x0+1)*P, P); };
  const p = (x, y, col) => { ctx.fillStyle = col; ctx.fillRect(x*P, y*P, P, P); };

  // FOOT
  r(oy,   ox-10,ox+8, C.foot);
  r(oy-1, ox-11,ox+9, C.body);
  r(oy-2, ox-11,ox+9, C.body);
  r(oy-3, ox-10,ox+8, C.body);
  r(oy-4, ox-9, ox+7, C.headHL);

  // HEAD
  r(oy-5, ox-13,ox-7, C.head);
  r(oy-6, ox-14,ox-6, C.head);
  r(oy-7, ox-14,ox-6, C.headHL);
  p(ox-14, oy-5, C.bodyD);

  // EYE STALKS
  r(oy-8,  ox-13,ox-13, C.stalk);
  r(oy-9,  ox-13,ox-13, C.stalk);
  r(oy-10, ox-13,ox-13, C.stalk);
  r(oy-8,  ox-11,ox-11, C.stalk);
  r(oy-9,  ox-11,ox-11, C.stalk);

  // EYES
  r(oy-11, ox-14,ox-12, C.eye);
  r(oy-10, ox-14,ox-12, C.eye);
  p(ox-13, oy-11, '#ffaaaa');
  r(oy-10, ox-11,ox-10, C.eye);
  r(oy-9,  ox-11,ox-10, C.eye);
  p(ox-11, oy-10, '#ffaaaa');

  // SHELL outer
  r(oy-12, ox-2, ox+10, C.shellD);
  r(oy-11, ox-4, ox+11, C.shell);
  r(oy-10, ox-5, ox+11, C.shell);
  r(oy-9,  ox-5, ox+11, C.shell);
  r(oy-8,  ox-5, ox+11, C.shell);
  r(oy-7,  ox-4, ox+11, C.shellD);
  r(oy-6,  ox-3, ox+10, C.shellD);
  r(oy-5,  ox-1, ox+9,  C.shellD);
  // Shell highlight + spiral
  r(oy-12, ox+1, ox+5,  C.shellHL);
  r(oy-11, ox+1, ox+3,  C.shellHL);
  r(oy-9,  ox+1, ox+5,  C.shellD);
  r(oy-8,  ox+5, ox+8,  C.shellD);
  r(oy-7,  ox+2, ox+6,  C.shellD);
  p(ox+4,  oy-10, C.shellD);

  // Mouth
  p(ox-11, oy-5, C.mouth);
  p(ox-10, oy-5, C.mouth);
  p(ox-9,  oy-5, C.mouth);

  // Update hitbox L/R to follow the boss horizontally (vertical span is fixed)
  b.hbLeft  = cx - 84;
  b.hbRight = cx + 66;
}

function drawBoss() {
  if (!gs.boss) return;
  const b = gs.boss;
  const drawFn = b.type === 'scorpion' ? drawScorpionBoss : drawSnailBoss;
  if (b.dying) {
    ctx.save();
    const sh = Math.round((Math.random() - 0.5) * 6);
    ctx.translate(sh, sh);
    ctx.globalAlpha = Math.max(0, 1 - b.deathT / 100);
    drawFn(b);
    ctx.restore();
    return;
  }
  drawFn(b);
}

// ── DRAW SCORPION BOSS (Variant A – Ökenskorpion) ──────────────────────────
function drawScorpionBoss(b) {
  const P = 8;   // större sprite för mer skräckinjagande boss
  const flash = b.flashT > 0 && Math.floor(b.flashT / 2) % 2 === 0;
  const c = flash ? SCORPION_FLASH : SCORPION_A;
  const cy = b.y + Math.round(b.bob);
  const cx = b.x;
  const ox = Math.round(cx / P), oy = Math.round(cy / P);
  const t  = b.ft;
  const pose = b.pose || 'idle';

  const r = (y, x0, x1, col) => { ctx.fillStyle = col; ctx.fillRect(x0*P, y*P, (x1-x0+1)*P, P); };
  const p = (x, y, col) => { ctx.fillStyle = col; ctx.fillRect(x*P, y*P, P, P); };

  // ── LEGS (4 stycken, alternerande step) ──────
  const legStep = Math.floor(t/10) % 2;
  ctx.fillStyle = c.leg;
  ctx.fillRect((ox-2)*P, (oy-1)*P, P, P + (legStep?0:P));
  ctx.fillRect((ox+0)*P, (oy-1)*P, P, P + (legStep?P:0));
  ctx.fillRect((ox+2)*P, (oy-1)*P, P, P + (legStep?0:P));
  ctx.fillRect((ox+4)*P, (oy-1)*P, P, P + (legStep?P:0));
  ctx.fillStyle = c.bodyD;
  ctx.fillRect((ox-2)*P, (oy)*P, P, P);
  ctx.fillRect((ox+0)*P, (oy)*P, P, P);
  ctx.fillRect((ox+2)*P, (oy)*P, P, P);
  ctx.fillRect((ox+4)*P, (oy)*P, P, P);

  // ── BODY ──────
  r(oy-1, ox-3, ox+5, c.bodyD);
  r(oy-2, ox-4, ox+6, c.bodyD);
  r(oy-3, ox-4, ox+6, c.bodyD);
  r(oy-4, ox-3, ox+5, c.bodyD);
  r(oy-2, ox-3, ox+5, c.body);
  r(oy-3, ox-3, ox+5, c.body);
  r(oy-3, ox-2, ox+4, c.bodyHL);
  r(oy-4, ox-2, ox+4, c.body);
  p(ox-1, oy-3, c.plate); p(ox-1, oy-2, c.plate);
  p(ox+1, oy-3, c.plate); p(ox+1, oy-2, c.plate);
  p(ox+3, oy-3, c.plate); p(ox+3, oy-2, c.plate);

  // ── EYES ──────
  p(ox-2, oy-3, c.eye);
  p(ox-1, oy-3, c.eye);

  // ── PINCER (utsträckning under 'pincer-spread' pose) ──────
  let pincerExt = 0;
  if (pose === 'pincer-spread') {
    pincerExt = Math.round(Math.sin(t*0.18) * 1.5 + 1.5);
  }
  const pcx = ox - 4 - pincerExt;
  r(oy-3, pcx-3, pcx, c.pincer);
  r(oy-2, pcx-3, pcx, c.pincer);
  p(pcx-3, oy-4, c.pincerD);
  p(pcx-3, oy-1, c.pincerD);
  r(oy-4, pcx-5, pcx-3, c.pincer);
  p(pcx-5, oy-4, c.pincerD);
  p(pcx-5, oy-5, c.pincerD);
  p(pcx-4, oy-5, c.pincer);
  r(oy-1, pcx-5, pcx-3, c.pincer);
  p(pcx-5, oy-1, c.pincerD);
  p(pcx-5, oy,   c.pincerD);
  p(pcx-4, oy,   c.pincer);

  // ── TAIL ──────
  let tailPath;
  if (pose === 'tail-up') {
    tailPath = [
      [ox+5, oy-4], [ox+5, oy-6], [ox+4, oy-8],
      [ox+2, oy-10], [ox+0, oy-12], [ox-2, oy-13],
      [ox-4, oy-13], [ox-6, oy-12],
    ];
  } else if (pose === 'tail-slam') {
    // Svansen dyker NER framför kroppen, stingern slår mot marken
    tailPath = [
      [ox+5, oy-4], [ox+5, oy-6], [ox+3, oy-6],
      [ox+1, oy-5], [ox-1, oy-4], [ox-3, oy-2],
      [ox-4, oy],            // stinger vid marknivå framför bossen
    ];
  } else if (pose === 'rear') {
    tailPath = [
      [ox+5, oy-4], [ox+5, oy-6], [ox+5, oy-8],
      [ox+4, oy-10], [ox+2, oy-11], [ox+0, oy-11],
      [ox-1, oy-10],
    ];
  } else {
    tailPath = [
      [ox+5, oy-4], [ox+5, oy-6], [ox+4, oy-8],
      [ox+2, oy-9], [ox+0, oy-10], [ox-1, oy-9],
      [ox-2, oy-8],
    ];
  }
  for (const [tx, ty] of tailPath) {
    r(ty,   tx-1, tx, c.tailD);
    r(ty-1, tx-1, tx, c.tail);
  }
  const stingerPos = tailPath[tailPath.length - 1];
  const stx = stingerPos[0], sty = stingerPos[1];
  p(stx-2, sty,    c.stingerTip);
  p(stx-2, sty-1,  c.stingerTip);
  p(stx-3, sty,    c.stingerD);

  // ── Stinger-laser charge: glödande sfär vid stinger-spetsen under windup ──
  // Visualiserar att stingern laddar upp energin INNAN beamen skjuts.
  if (b.attackType === 'pincer' && b.attackState === 'windup') {
    drawStingerCharge(b, (stx - 2) * P, sty * P);
  }
}

function drawStingerCharge(b, sx, sy) {
  const u = Math.min(1, b.attackStateT / 38);    // 0..1 windup-progress
  const pulse = 0.7 + 0.3 * Math.sin(b.ft * 0.5);
  const radius = 4 + u * 14;

  // Yttre halo (gradient)
  const grad = ctx.createRadialGradient(sx, sy, 0, sx, sy, radius * 2.4);
  grad.addColorStop(0,   'rgba(255,255,220,' + (0.95 * u * pulse) + ')');
  grad.addColorStop(0.35,'rgba(255,200,80,'  + (0.7  * u * pulse) + ')');
  grad.addColorStop(0.7, 'rgba(255,100,20,'  + (0.4  * u) + ')');
  grad.addColorStop(1,   'rgba(255,40,0,0)');
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.arc(sx, sy, radius * 2.4, 0, Math.PI * 2);
  ctx.fill();

  // Kärna (vit, växande)
  ctx.fillStyle = 'rgba(255,255,255,' + (0.85 * u) + ')';
  ctx.beginPath();
  ctx.arc(sx, sy, Math.max(2, radius * 0.45), 0, Math.PI * 2);
  ctx.fill();

  // Energi-gnistor som dras mot stingern (signalerar uppladdning)
  if (u > 0.25) {
    for (let i = 0; i < 6; i++) {
      const ang  = (b.ft * 0.08 + i * Math.PI / 3) % (Math.PI * 2);
      const phase = ((b.ft * 1.5 + i * 6) % 26) / 26;       // 1 → 0 över tid
      const dist  = (1 - phase) * 26 + 4;
      const px2 = sx + Math.cos(ang) * dist;
      const py2 = sy + Math.sin(ang) * dist;
      ctx.fillStyle = 'rgba(255,220,80,' + (0.8 * u * phase) + ')';
      ctx.fillRect(px2 - 1.5, py2 - 1.5, 3, 3);
    }
  }
}

// ── DRAW SCORPION PROJECTILES ──────────────────────────────────────────────
// Svansen själv står för det visuella slaget (via 'tail-slam'-posen).
// Vi behåller bara en lätt damm-byst när stingern träffar marken — inga
// orange linjer/ringar/spikar som kan misstas för en "energiprojektil".
function drawShockwaves() {
  for (const s of gs.shockwaves) {
    const ft = s.ft;
    // Subtila damm-puffar precis vid slag-punkten, första ~12 frames
    if (ft < 12) {
      const alpha = 1 - ft / 12;
      ctx.fillStyle = 'rgba(200,160,110,' + (alpha * 0.5) + ')';
      for (let i = 0; i < 5; i++) {
        const angle = ((i + 0.5) / 5) * Math.PI;            // 0..π → vänster halvcirkel
        const dist = 4 + ft * 1.2 + i * 1.5;
        const px2 = s.x + Math.cos(angle) * dist * 1.2;
        const py2 = s.y - Math.sin(angle) * dist * 0.5 - ft * 0.2;
        ctx.fillRect(px2 - 1, py2 - 1, 2, 2);
      }
    }
  }
}

function drawEnergyBeams() {
  for (const e of gs.energyBeams) {
    const flicker = 0.65 + 0.35 * Math.sin(e.ft * 0.6);
    // Beam fade in/out around its life-window
    let intensity = 1;
    if (e.ft < 4) intensity = e.ft / 4;
    else if (e.ft > e.life) intensity = Math.max(0, 1 - (e.ft - e.life) / 14);
    const a = intensity * flicker;
    if (a <= 0) continue;
    const beamX = e.xLeft, beamW = e.xRight - e.xLeft;
    // Bredare gradient-glow
    const grad = ctx.createLinearGradient(beamX, e.y, e.xRight, e.y);
    grad.addColorStop(0,    'rgba(255,80,30,0)');
    grad.addColorStop(0.15, 'rgba(255,180,40,' + (0.5 * a) + ')');
    grad.addColorStop(0.85, 'rgba(255,80,30,' + (0.8 * a) + ')');
    grad.addColorStop(1,    'rgba(255,40,0,0)');
    ctx.fillStyle = grad;
    ctx.fillRect(beamX, e.y - 13, beamW, 26);
    // Inre kärna
    ctx.fillStyle = 'rgba(255,240,150,' + a + ')';
    ctx.fillRect(beamX, e.y - 3, beamW, 6);
    // Gnistor längs banan
    for (let i = 0; i < 10; i++) {
      const sx = beamX + ((i+1) * beamW / 11) + Math.sin(e.ft*0.4 + i) * 6;
      const sy = e.y + Math.sin(e.ft*0.5 + i*1.7) * 8;
      ctx.fillStyle = 'rgba(255,220,80,' + a + ')';
      ctx.fillRect(sx, sy, 3, 3);
    }

    // ── BLIXT-EXPLOSION vid stingern när beamen avfyras (frame 0–10) ──────
    if (e.srcX !== undefined && e.ft < 12) {
      const flashU = 1 - e.ft / 12;
      const flashR = 12 + e.ft * 4;
      const flashGrad = ctx.createRadialGradient(e.srcX, e.srcY, 0, e.srcX, e.srcY, flashR);
      flashGrad.addColorStop(0,   'rgba(255,255,255,' + flashU + ')');
      flashGrad.addColorStop(0.4, 'rgba(255,220,80,'  + (flashU * 0.8) + ')');
      flashGrad.addColorStop(1,   'rgba(255,80,0,0)');
      ctx.fillStyle = flashGrad;
      ctx.beginPath();
      ctx.arc(e.srcX, e.srcY, flashR, 0, Math.PI * 2);
      ctx.fill();
      // Star-burst spikar utåt (kort sken)
      if (e.ft < 6) {
        ctx.strokeStyle = 'rgba(255,255,200,' + flashU + ')';
        ctx.lineWidth = 2;
        const spikeLen = 18 - e.ft * 2;
        for (let i = 0; i < 4; i++) {
          const ang = i * Math.PI / 2 + e.ft * 0.1;
          ctx.beginPath();
          ctx.moveTo(e.srcX, e.srcY);
          ctx.lineTo(e.srcX + Math.cos(ang) * spikeLen, e.srcY + Math.sin(ang) * spikeLen);
          ctx.stroke();
        }
      }
    }
  }
}

function drawVenomPools() {
  for (const v of gs.venomPools) {
    if (v.state === 'arc') {
      const u = v.t / v.arcDur;
      const arcHeight = 80;
      const x = v.sx + (v.ex - v.sx) * u;
      const y = v.sy + (v.ey - v.sy) * u - arcHeight * Math.sin(u * Math.PI);
      // Trail
      for (let i = 0; i < 5; i++) {
        const tu = u - i * 0.04;
        if (tu < 0) continue;
        const tx = v.sx + (v.ex - v.sx) * tu;
        const ty = v.sy + (v.ey - v.sy) * tu - arcHeight * Math.sin(tu * Math.PI);
        ctx.fillStyle = 'rgba(80,220,40,' + (0.6 - i*0.1) + ')';
        ctx.fillRect(tx - 3, ty - 3, 6, 6);
      }
      // Main droplet
      ctx.fillStyle = '#66ff44';
      ctx.beginPath(); ctx.arc(x, y, 5, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#aaff88';
      ctx.beginPath(); ctx.arc(x-1, y-1, 2, 0, Math.PI*2); ctx.fill();
    } else {
      // pool
      const w = v.poolW;
      if (w <= 0) continue;
      const px2 = v.poolX, py = v.poolY;
      ctx.fillStyle = 'rgba(60,160,30,0.85)';
      ctx.fillRect(px2 - w/2, py - 5, w, 5);
      ctx.fillStyle = '#66dd44';
      ctx.fillRect(px2 - w/2, py - 4, w, 2);
      // Bubblor
      for (let i = 0; i < 4; i++) {
        const bx = px2 - w/2 + 6 + i * (w - 12) / 3;
        const by = py - 7 + Math.sin(v.poolLife*0.12 + i) * 2;
        ctx.fillStyle = '#aaff88';
        ctx.fillRect(bx, by, 2, 2);
      }
      // Glittrande partiklar
      for (let i = 0; i < 3; i++) {
        const sx = px2 - w/2 + (i+1) * w/4 + Math.sin(v.poolLife*0.2 + i) * 3;
        const sy = py - 6 - ((v.poolLife*0.4 + i*3) % 10);
        ctx.fillStyle = 'rgba(120,255,80,0.5)';
        ctx.fillRect(sx, sy, 2, 2);
      }
    }
  }
}

function drawSlimeWaves() {
  const P = 4;
  for (const s of gs.slimeWaves) {
    const ox = Math.round(s.x / P), oy = Math.round(s.y / P);
    // Lägre våg: ~2–5 P-units tall (visuellt ≤ ~20 px) så den går att hoppa över
    const halfW = 7;
    for (let i = -halfW; i <= halfW; i++) {
      const h = Math.max(1, Math.round(3 + Math.sin((i*0.5) + s.ft*0.14) * 2));
      ctx.fillStyle = i%3 === 0 ? '#33bb22' : i%3 === 1 ? '#228811' : '#44dd22';
      ctx.fillRect((ox + i) * P, (oy - h) * P, P, h * P);
    }
    // Drip tips
    for (let i = -halfW; i <= halfW; i += 2) {
      const h = Math.max(1, Math.round(3 + Math.sin((i*0.5) + s.ft*0.14) * 2));
      ctx.fillStyle = '#66ff44';
      ctx.fillRect((ox + i) * P, (oy - h - 1) * P, P, P);
    }
    // Highlight + ground slick
    ctx.fillStyle = '#aaffaa';
    ctx.fillRect((ox - 2) * P, (oy - 4) * P, 4*P, P);
    ctx.fillStyle = '#115511';
    ctx.fillRect((ox - halfW) * P, oy * P, (halfW*2 + 1) * P, P);
  }
}

function drawMiniSnail(e, flash) {
  const P = 3;
  const wob = Math.floor(e.ft / 8) % 2 === 0 ? 0 : -P;
  const ox = Math.round(e.x / P), oy = Math.round(e.y / P);

  const c = flash ? {
    body:'#ffffff', bodyD:'#dddddd', shell:'#ffffff', shellD:'#dddddd', shellHL:'#ffffff', eye:'#ffffff'
  } : {
    body:'#88aa44', bodyD:'#556633', shell:'#cc9944', shellD:'#885522', shellHL:'#ffcc66', eye:'#ff2233'
  };

  const r = (y, x0, x1, col) => { ctx.fillStyle = col; ctx.fillRect(x0*P, y*P + wob, (x1-x0+1)*P, P); };
  const p = (x, y, col) => { ctx.fillStyle = col; ctx.fillRect(x*P, y*P + wob, P, P); };

  // Foot
  r(oy,   ox-5, ox+4, c.bodyD);
  r(oy-1, ox-5, ox+4, c.body);
  r(oy-2, ox-4, ox+3, c.body);
  // Head + stalks (head faces LEFT toward player)
  r(oy-3, ox-6, ox-3, c.body);
  r(oy-4, ox-7, ox-3, c.body);
  p(ox-6, oy-5, c.body); p(ox-6, oy-6, c.eye);
  p(ox-4, oy-5, c.body); p(ox-4, oy-6, c.eye);
  // Shell on the back (right)
  r(oy-5, ox-1, ox+4, c.shell);
  r(oy-4, ox-1, ox+4, c.shell);
  r(oy-3, ox,   ox+4, c.shellD);
  p(ox+1, oy-5, c.shellHL);
  p(ox+2, oy-4, c.shellD);
}

function drawBossVictory() {
  ctx.save();
  ctx.textAlign = 'center';
  ctx.fillStyle = 'rgba(0,0,0,0.55)';
  ctx.fillRect(0, canvas.height/2 - 50, canvas.width, 100);
  ctx.font = '18px "Press Start 2P"';
  ctx.fillStyle = '#FFD700';
  ctx.shadowColor = '#aa6600'; ctx.shadowBlur = 14;
  const label = gs.lastBossKilled === 'scorpion' ? 'SKORPION BESEGRAD!' : 'SNIGEL BESEGRAD!';
  ctx.fillText(label, canvas.width/2, canvas.height/2 + 2);
  ctx.shadowBlur = 0;
  ctx.font = '8px "Press Start 2P"';
  if (gs.bossTest) {
    ctx.fillStyle = 'rgba(255,255,255,0.7)';
    ctx.fillText('Återgår till meny...', canvas.width/2, canvas.height/2 + 26);
  } else {
    ctx.fillStyle = '#FFD700';
    ctx.shadowColor = '#aa6600'; ctx.shadowBlur = 8;
    ctx.fillText('+100 POÄNG · FAS 2 BÖRJAR!', canvas.width/2, canvas.height/2 + 26);
    ctx.shadowBlur = 0;
  }
  ctx.restore();
  ctx.textAlign = 'left';
}

function drawBossHP() {
  if (!gs.boss || gs.boss.dying || gs.boss.entering) return;
  const b = gs.boss;
  const bw = 200, bh = 12;
  // Placerad så hearts (vänster) och score (höger) inte täcks över
  const bx = Math.round(canvas.width / 2 - bw / 2 - 40);
  const by = 14;
  // Backdrop
  ctx.fillStyle = '#0a0a0a';
  ctx.fillRect(bx - 2, by - 2, bw + 4, bh + 4);
  ctx.fillStyle = '#330000';
  ctx.fillRect(bx, by, bw, bh);
  // Fill – samma röda nyans som liv-hjärtana (#ee2244), tonar mot varning vid låg HP
  const fillW = (b.hp / b.maxHp) * bw;
  ctx.fillStyle = b.hp > 6 ? '#ee2244' : b.hp > 3 ? '#ff8822' : '#ffdd22';
  ctx.fillRect(bx, by, fillW, bh);
  // Top shine (1 px) – speglar hjärtanas highlight
  if (b.hp > 6 && fillW > 2) {
    ctx.fillStyle = '#ff99bb';
    ctx.fillRect(bx, by, fillW, 2);
  }
  // Segment ticks (every 10%)
  ctx.fillStyle = 'rgba(0,0,0,0.55)';
  for (let i = 1; i < b.maxHp; i++) {
    ctx.fillRect(bx + (i/b.maxHp)*bw - 1, by, 1, bh);
  }
  // Border
  ctx.strokeStyle = '#888'; ctx.lineWidth = 1;
  ctx.strokeRect(bx, by, bw, bh);
  // Label (centrerad under baren)
  ctx.fillStyle = 'white';
  ctx.font = '7px "Press Start 2P"';
  ctx.textAlign = 'center';
  ctx.shadowColor = '#000'; ctx.shadowBlur = 4;
  const bossLabel = b.type === 'scorpion' ? 'SKORPION' : 'SNIGEL';
  ctx.fillText(bossLabel + ' ' + b.hp + '/' + b.maxHp, bx + bw / 2, by + bh + 12);
  ctx.shadowBlur = 0;
  ctx.textAlign = 'left';
}

function submitName() {
  const n = playerName.trim();
  if (!n) return;
  playerName = n;
  nameInputEl.style.display = 'none';
  nameInputEl.blur();
  loadScores();
  gs.state = 'mainmenu';
}

// ── DIFFICULTY ────────────────────────────────────────────────────────────────
function updateDifficulty() {
  // Effective elapsed = real time MINUS tid som spenderats i bossfight (gs.pausedMs)
  const t = (performance.now() - gs.startTime - gs.pausedMs) / 1000;
  // Faster start (1.8), immediate ramp, sharper acceleration after 90s
  gs.worldSpeed = 1.8 + t * 0.014 + (t > 90 ? (t - 90) * 0.05 : 0);
  gs.worldSpeed = Math.min(gs.worldSpeed, 8);
  gs.spawnRate  = Math.max(45, 160 - t * 1.2);
  // Fas 2 låser upp efter att snigelbossen har besegrats (sker tidigast runt t=90)
  if (t > 90 && gs.snailBossDone)     gs.phase = Math.max(gs.phase, 2);
  // Fas 3 låser upp efter att scorpionbossen har besegrats (sker tidigast runt t=240)
  if (t > 240 && gs.scorpionBossDone) gs.phase = Math.max(gs.phase, 3);
}

// ── MAIN LOOP ─────────────────────────────────────────────────────────────────
function update() {
  if (gs.state !== 'playing') return;

  gs.frame++;
  // Boss-test sessions don't accumulate score/distance.
  // I riktigt spel pausas poängräkningen så fort en boss är aktiv (entré + fight)
  // och återupptas direkt när bossen börjar dö – så man inte kan farma poäng på
  // minisniglar eller bara stå still vid bossen.
  if (!gs.bossTest) {
    const bossActive = gs.boss && !gs.boss.dying;
    if (!bossActive) gs.distance++;
    gs.score = Math.max(gs.score, (gs.distance / 12) | 0);
    // Pausa difficulty-timern under hela boss-encounter (entré + fight + segermoment)
    // så worldSpeed och spawnRate inte hinner skjuta i höjden under fighten.
    if (gs.boss || gs.bossDefeated) gs.pausedMs += 1000 / 60;
    updateDifficulty();
  }
  // Music: boss-track (4) under hela bossfighten OCH segermomentet,
  // sen rakt över till nya fasens musik när fas 2 låses upp.
  // Musik: T4 = snigel-boss (Battle Mörk), T5 = scorpion-boss (Sandstorm),
  // annars fas-musik. Boss-låten fortsätter spela under segermomentet.
  let _musicTrack = gs.phase;
  if (gs.boss) {
    _musicTrack = gs.boss.type === 'scorpion' ? 5 : 4;
  } else if (gs.bossDefeated) {
    _musicTrack = gs.lastBossKilled === 'scorpion' ? 5 : 4;
  }
  bgm.update(_musicTrack);
  updateBackground();
  updateBlob();
  updateFireballs();
  updateEnemyFireballs();
  updateEnemies();
  updateBoss();
  updateSlimeWaves();
  updateShockwaves();
  updateEnergyBeams();
  updateVenomPools();
  updateParticles();
  updateHeartAnims();
  updateFireballExplosions();
  updateIceExplosions();
  updateGifts();

  // Ice power timer
  if (gs.icePower && performance.now() >= gs.icePowerEnd) {
    gs.icePower = false;
    blob.specialCD = 60; // 1-second refill after ice power ends
  }

  // ── Pre-boss rensningsfönster ────────────────────────────────────────────────
  // Snigeln dyker upp innan fas 2 (t > 88), scorpionen innan fas 3 (t > 238).
  // Under fönstret slutar vi spawna nya fiender och väntar tills planen är fri.
  // Använder effektiv tid (real minus pausedMs) så timern inte tickar under bossfight.
  const tSecNow = (performance.now() - gs.startTime - gs.pausedMs) / 1000;
  const inPreSnailWindow    = !gs.bossTest && !gs.boss && !gs.bossDefeated &&
                              !gs.snailBossDone && tSecNow > 88;
  const inPreScorpionWindow = !gs.bossTest && !gs.boss && !gs.bossDefeated &&
                              gs.snailBossDone && !gs.scorpionBossDone && tSecNow > 238;
  const inPreBossWindow = inPreSnailWindow || inPreScorpionWindow;

  if (inPreSnailWindow) {
    gs.snailBossArmed = true;
    // Spawna snigeln när planen är fri från goblins/jättar/bats (minisniglar räknas inte)
    const blockers = gs.enemies.filter(e => !e.dead && e.type !== 'mini-snail');
    if (blockers.length === 0) spawnSnailBoss();
  } else if (inPreScorpionWindow) {
    gs.scorpionBossArmed = true;
    // Spawna scorpionen när planen är fri från vanliga fiender
    const blockers = gs.enemies.filter(e => !e.dead && e.type !== 'mini-snail');
    if (blockers.length === 0) spawnScorpionBoss();
  }

  // Gift spawn milestone (suppressed during a boss fight / boss test / pre-boss)
  if (!gs.boss && !gs.bossTest && !inPreBossWindow
      && !gs.gifts.some(g => !g.dead) && gs.score >= gs.nextGiftScore) {
    gs.nextGiftScore += 400;
    spawnGift();
  }

  // Normal enemy spawn — paused while the boss is alive or about to arrive
  if (!gs.boss && !gs.bossTest && !inPreBossWindow) {
    gs.spawnTimer++;
    if (gs.spawnTimer >= gs.spawnRate) {
      spawnEnemy();
      gs.spawnTimer = 0;
    }
  }

  // ── Boss-defeated transition ─────────────────────────────────────────────────
  // Test-läge → tillbaka till menyn. Riktigt spel → låt upp fas 2 efter en
  // kort segerpaus så bakgrunden börjar scrolla igen mjukt.
  if (gs.bossDefeated) {
    gs.bossVictoryT++;
    const VICT_FRAMES = gs.bossTest ? 90 : 120;
    if (gs.bossVictoryT >= VICT_FRAMES) {
      if (gs.bossTest) {
        bgm.stop();
        gs.state    = 'mainmenu';
        gs.bossTest = null;
      } else {
        // Lås upp nästa fas → bakgrund + scroll återupptas via updateBackground.
        // Sätt rätt flagga baserat på vilken boss som just besegrades.
        if (gs.lastBossKilled === 'scorpion') {
          gs.scorpionBossDone  = true;
          gs.scorpionBossArmed = false;
        } else {
          gs.snailBossDone  = true;
          gs.snailBossArmed = false;
        }
        // Nollställ alla spawn-cooldowns så det inte sprutas fiender/bats direkt
        gs.spawnTimer     = 0;
        gs.lastBatFrame   = gs.frame;
        gs.lastGiantFrame = gs.frame;
      }
      gs.bossDefeated = false;
    }
  }

  // ── Bat spawn (independent of normal enemy timer, starts after 25 s) ─────────
  const BAT_COOLDOWN = 360; // min 6 seconds between bats
  if (!gs.boss && !gs.bossTest && !inPreBossWindow
      && tSecNow > 25
      && gs.frame - gs.lastBatFrame >= BAT_COOLDOWN
      && Math.random() < 0.008) {
    gs.lastBatFrame = gs.frame;
    const baseY = 150 + Math.random() * 70; // fly at ~150-220 px from top
    gs.enemies.push({
      type: 'bat', x: canvas.width + 30, y: baseY, baseY,
      hw: 24, hh: 16, hp: 1, maxHp: 1,
      speed: 2.2 + Math.random() * 0.8 + (gs.phase - 1) * 0.3,
      dead: false, deathT: 0, ft: 0,
      batState: 'flying', attackMode: null, vx: 0, vy: 0,
    });
  }
}

function draw() {
  if (gs.state === 'nameentry')    { drawNameEntry();    return; }
  if (gs.state === 'mainmenu')     { drawMainMenu();     return; }
  if (gs.state === 'leaderboard')  { drawLeaderboard();  return; }
  if (gs.state === 'credits')      { drawCredits();      return; }

  drawBackground();
  drawParticles();
  drawFireballExplosions();
  drawIceExplosions();
  drawGifts();
  drawEnemies();
  drawBoss();
  drawSlimeWaves();
  drawShockwaves();
  drawVenomPools();
  drawEnergyBeams();
  drawFireballs();
  drawEnemyFireballs();
  drawBlob();
  drawHeartAnims();
  drawHUD();
  drawBossHP();
  if (gs.bossDefeated) drawBossVictory();
  if (gs.state === 'gameover') drawGameOver();
}

// Fixed timestep – runs game logic at exactly 60 steps/s regardless of display Hz
const STEP_MS   = 1000 / 60;          // 16.667 ms per logic step
let   _lastTime = performance.now();  // initialised before first loop call
let   _accum    = 0;

function loop(timestamp = performance.now()) {
  const elapsed = Math.min(timestamp - _lastTime, 50); // cap at 50 ms (tab hidden etc.)
  _lastTime  = timestamp;
  _accum    += elapsed;

  while (_accum >= STEP_MS) {
    update();
    updateGameOverFX();
    _accum -= STEP_MS;
  }

  draw();
  requestAnimationFrame(loop);
}

// ── APPLE TOUCH ICON (generated from blob sprite, 180×180) ───────────────────
(function generateAppIcon() {
  const ic = document.createElement('canvas');
  ic.width = ic.height = 180;
  const c = ic.getContext('2d');
  const Q = 8;

  // Sky bands
  c.fillStyle = '#aaddff'; c.fillRect(0,   0, 180,  81);
  c.fillStyle = '#cceeff'; c.fillRect(0,  81, 180,  63);
  c.fillStyle = '#bbffee'; c.fillRect(0, 144, 180,  36);

  // Ground
  const GY = 148;
  c.fillStyle = '#99dd66'; c.fillRect(0, GY,    180, 32);
  c.fillStyle = '#77bb44'; c.fillRect(0, GY,    180,  Q);
  c.fillStyle = '#99dd66'; c.fillRect(0, GY+Q,  180,  Q);

  // Pixel cloud
  c.fillStyle = '#ffffff';
  c.fillRect(102, 20, 44, Q); c.fillRect(94, 20+Q, 60, Q); c.fillRect(102, 20+2*Q, 44, Q);

  // Blob sprite helpers (local to this scope)
  const bx = 90 - 7*Q, by = GY - 10*Q;
  function idot(gx,gy,col){ c.fillStyle=col; c.fillRect(bx+gx*Q,by+gy*Q,Q,Q); }
  function irun(gy,x0,x1,col){ c.fillStyle=col; c.fillRect(bx+x0*Q,by+gy*Q,(x1-x0+1)*Q,Q); }

  const body=[[-1,4,10],[0,2,12],[1,1,13],[2,1,13],[3,1,13],[4,1,13],[5,1,13],[6,1,13],[7,2,12],[8,4,10]];
  const O='#1a3a1a', G='#55bb55', L='#aaee88', D='#2a7a2a';
  irun(-2,3,11,O);
  for (const [gy,x0,x1] of body) irun(gy,x0-1,x1+1,O);
  irun(9,3,11,O);
  for (const [gy,x0,x1] of body) {
    irun(gy,x0,x1,G);
    irun(gy,x0,x0+1, gy<=3 ? L : G);
    idot(x1,gy,D);
  }
  // Eyes
  irun(4,3,4,'#fff'); irun(5,3,4,'#fff');
  idot(3,5,'#ffddcc'); idot(4,5,'#cc4433'); idot(3,4,'#fff');
  irun(4,9,10,'#fff'); irun(5,9,10,'#fff');
  idot(9,5,'#ffddcc'); idot(10,5,'#cc4433'); idot(9,4,'#fff');
  // Mouth
  idot(6,7,O); idot(7,7,O); idot(8,7,O); idot(5,8,O); idot(9,8,O);

  // Sword (pixel art, rest angle)
  const sx = bx + 14*Q, sy = by + 5*Q;
  for (const [dy,dx,col] of [[0,0,'#fff'],[1,1,'#ddd'],[2,1,'#ddd'],[3,2,'#aaa'],[4,2,'#aaa'],[5,3,'#aaa'],[6,3,'#aaa'],[7,4,'#888'],[8,4,'#888']]) {
    c.fillStyle=col; c.fillRect(sx+dx*Q, sy-dy*Q, Q, Q);
  }
  c.fillStyle='#ffcc00'; c.fillRect(sx+Q, sy+Q, 3*Q, Q);
  c.fillStyle='#cc9900'; c.fillRect(sx+Q, sy+Q, Q, Q);
  c.fillStyle='#884422'; c.fillRect(sx+2*Q, sy+2*Q, Q, 3*Q);
  c.fillStyle='#552200'; c.fillRect(sx+2*Q, sy+4*Q, Q, Q);


  const link = document.createElement('link');
  link.rel  = 'apple-touch-icon';
  link.href = ic.toDataURL('image/png');
  document.head.appendChild(link);
})();

// Wire up HTML name input
nameInputEl.addEventListener('input', () => {
  playerName = nameInputEl.value.toUpperCase().slice(0, 10);
  nameInputEl.value = playerName;
});
nameInputEl.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    e.preventDefault();
    e.stopPropagation();   // stoppa bubbling — annars triggar document-listener startGame() direkt efter
    submitName();
  }
});

// Start on name entry screen
gs = { state: 'nameentry' };
nameInputEl.style.display = 'block';
nameInputEl.focus();
loop();
</script>
